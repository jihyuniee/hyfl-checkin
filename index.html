<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>입장 체크인 — 한영외국어고등학교</title>
  <link rel="stylesheet" href="style.css?v=kiosk-5" />
</head>
<body>

  <!-- 좌측: 조작 패널 -->
  <div class="left-panel">

    <div class="school-info">
      <div class="school-name">한영외국어고등학교 입학설명회</div>
      <div class="event-label">입장 QR 체크인</div>
    </div>

    <div class="count-section">
      <div class="count-title">입장 인원</div>
      <div id="countSelector">
        <button class="count-btn selected" data-count="1" type="button">1</button>
        <button class="count-btn" data-count="2" type="button">2</button>
        <button class="count-btn" data-count="3" type="button">3</button>
        <button class="count-btn" data-count="4" type="button">4</button>
        <button class="count-btn" data-count="5" type="button">5</button>
        <button class="count-btn" data-count="6" type="button">6명</button>
      </div>
    </div>

    <div class="guide-text">
      입장 인원을 선택한 뒤<br>QR코드를 카메라에 비춰주세요
      <span class="guide-sub">휴대폰 화면 밝기를 높이면 인식이 잘 됩니다</span>
    </div>

    <button id="startBtn" type="button">카메라 시작</button>

  </div>

  <!-- 우측: 카메라 영역 -->
  <div class="right-panel">
    <video id="camera" autoplay playsinline muted></video>
    <div class="guide-overlay" aria-hidden="true">
      <div class="qr-box">
        <i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i>
      </div>
    </div>
    <div id="statusMsg" class="state-ready">QR코드를 비춰주세요</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" defer></script>
  <script src="script.js?v=kiosk-5" defer></script>
</body>
</html>
